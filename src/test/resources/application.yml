server:
  port: 10002

spring:
  application:
    name: spring-ai-alibaba-qwq-chat-client-example

  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.NacosConfigAutoConfiguration

  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    # 生产者确认模式
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        # 手动ACK，消费失败不丢消息
        acknowledge-mode: manual
        # 消费失败重试
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2
          max-interval: 10000ms

  datasource:
    url: jdbc:mysql://172.26.37.241:3306/ai_agent?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  ai:
    dashscope:
      api-key: sk-c735403c3582433c9fa22c4008d69b7b
      chat:
        options:
          model: qwen-plus

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.max.ai_agent.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

chat:
  memory:
    redis-ttl: 3600
    max-size: 100